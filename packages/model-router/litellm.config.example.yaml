# LiteLLM Configuration Example
# This file demonstrates how to configure LiteLLM proxy for the Multi-Model Agent Teams Platform

model_list:
  # Anthropic Claude Models - Quality-first tier
  - model_name: claude-opus-4
    litellm_params:
      model: anthropic/claude-opus-4-20250514
      api_key: ${ANTHROPIC_API_KEY}

  - model_name: claude-sonnet-4.5
    litellm_params:
      model: anthropic/claude-sonnet-4.5-20250520
      api_key: ${ANTHROPIC_API_KEY}

  - model_name: claude-sonnet-3.7
    litellm_params:
      model: anthropic/claude-sonnet-3-7-20250219
      api_key: ${ANTHROPIC_API_KEY}

  - model_name: claude-haiku-3.5
    litellm_params:
      model: anthropic/claude-haiku-3-5-20241022
      api_key: ${ANTHROPIC_API_KEY}

  # OpenAI GPT Models
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: ${OPENAI_API_KEY}

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: ${OPENAI_API_KEY}

  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo
      api_key: ${OPENAI_API_KEY}

  - model_name: o1
    litellm_params:
      model: openai/o1
      api_key: ${OPENAI_API_KEY}

  - model_name: o1-mini
    litellm_params:
      model: openai/o1-mini
      api_key: ${OPENAI_API_KEY}

  # Google Gemini Models
  - model_name: gemini-2.0-flash
    litellm_params:
      model: google/gemini-2.0-flash
      api_key: ${GOOGLE_API_KEY}

  - model_name: gemini-2.0-flash-thinking
    litellm_params:
      model: google/gemini-2.0-flash-thinking-exp
      api_key: ${GOOGLE_API_KEY}

  - model_name: gemini-1.5-pro
    litellm_params:
      model: google/gemini-1.5-pro
      api_key: ${GOOGLE_API_KEY}

  - model_name: gemini-1.5-flash
    litellm_params:
      model: google/gemini-1.5-flash
      api_key: ${GOOGLE_API_KEY}

# Router Settings
router_settings:
  routing_strategy: quality-first
  num_retries: 3
  timeout: 30
  fallback_enabled: true

  # Quality-first routing - NEVER consider cost
  model_group_alias:
    high-quality:
      - claude-opus-4
      - gpt-4o
      - gemini-2.0-flash-thinking

    balanced:
      - claude-sonnet-4.5
      - gpt-4o-mini
      - gemini-2.0-flash

    fast:
      - claude-haiku-3.5
      - gpt-4o-mini
      - gemini-1.5-flash

# General Settings
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: postgresql://user:password@localhost:5432/litellm

  # Logging - NO cost tracking
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

  # Cache settings
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: 6379

  # Security
  enable_jwt_auth: true
  jwt_public_key_url: ${JWT_PUBLIC_KEY_URL}

  # Performance
  max_parallel_requests: 100
  max_queue_size: 500

  # Health checks
  health_check_interval: 60

# Environment-specific settings
litellm_settings:
  # Disable cost tracking completely
  track_cost: false

  # Retry settings
  request_timeout: 30
  num_retries: 3

  # Streaming
  stream_timeout: 300

  # Debugging (disable in production)
  set_verbose: false
  json_logs: true

# Prometheus metrics (exclude cost metrics)
prometheus:
  enabled: true
  port: 9090
  include_cost_metrics: false
