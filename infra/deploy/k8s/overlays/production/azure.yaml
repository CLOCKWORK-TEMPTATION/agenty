# Azure AKS specific configurations
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ./

# Azure-specific patches
patches:
  # Use Azure Managed Disk for PostgreSQL
  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |-
      - op: add
        path: /spec/storageClassName
        value: managed-premium

  # Use Azure Managed Disk for Redis
  - target:
      kind: PersistentVolumeClaim
      name: redis-pvc
    patch: |-
      - op: add
        path: /spec/storageClassName
        value: managed-premium

  # Add Azure Application Gateway annotations to Ingress
  - target:
      kind: Ingress
      name: main-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1ssl-redirect
        value: "true"
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1connection-draining
        value: "true"
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1connection-draining-timeout
        value: "30"
      - op: add
        path: /metadata/annotations/appgw.ingress.kubernetes.io~1cookie-based-affinity
        value: "false"

  # Add node affinity for specific VM sizes
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: add
        path: /spec/template/spec/affinity/nodeAffinity
        value:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/agentpool
                    operator: In
                    values:
                      - nodepool1
                      - computepool

  # Add Azure Workload Identity annotations
  - target:
      kind: ServiceAccount
      name: api-sa
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          azure.workload.identity/client-id: CLIENT_ID
          azure.workload.identity/tenant-id: TENANT_ID

resources:
  - service-account.yaml
