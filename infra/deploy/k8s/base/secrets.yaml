# WARNING: This is a template file. DO NOT commit actual secrets.
# Use External Secrets Operator or Sealed Secrets in production.
# For local development, copy this file and fill in actual values.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: multi-agent-platform
  labels:
    app.kubernetes.io/name: multi-agent-platform
type: Opaque
stringData:
  # Database credentials
  DB_USER: "postgres"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"

  # Redis password
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"

  # JWT secrets
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_SECURE_JWT_REFRESH_SECRET"

  # Encryption keys
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_ENCRYPTION_KEY"

  # API keys for AI providers (LiteLLM will use these)
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
  GOOGLE_API_KEY: "REPLACE_WITH_GOOGLE_API_KEY"
  COHERE_API_KEY: "REPLACE_WITH_COHERE_API_KEY"
  MISTRAL_API_KEY: "REPLACE_WITH_MISTRAL_API_KEY"

  # LiteLLM master key
  LITELLM_MASTER_KEY: "REPLACE_WITH_LITELLM_MASTER_KEY"

  # MCP server credentials (if needed)
  MCP_SERVER_AUTH_TOKEN: "REPLACE_WITH_MCP_AUTH_TOKEN"

  # Session secret
  SESSION_SECRET: "REPLACE_WITH_SECURE_SESSION_SECRET"

  # Webhook secrets
  WEBHOOK_SECRET: "REPLACE_WITH_WEBHOOK_SECRET"
