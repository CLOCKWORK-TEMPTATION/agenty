apiVersion: v1
kind: Service
metadata:
  name: litellm-service
  namespace: multi-agent-platform
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
