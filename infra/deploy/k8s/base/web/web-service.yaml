apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: multi-agent-platform
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
