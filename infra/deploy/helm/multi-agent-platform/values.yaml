# Default values for multi-agent-platform.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

api:
  replicaCount: 1
  image:
    repository: myregistry/api
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
  resources: {}

web:
  replicaCount: 1
  image:
    repository: myregistry/web
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
  resources: {}

config:
  nodeEnv: "production"
  litellmApiBase: "http://litellm:4000"

extraEnvVars: {}

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: api.multi-agent.local
      paths:
        - path: /
          pathType: Prefix
          service: api
          port: 80
    - host: multi-agent.local
      paths:
        - path: /
          pathType: Prefix
          service: web
          port: 80
  tls: []
