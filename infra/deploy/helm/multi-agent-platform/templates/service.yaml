apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-agent-platform.fullname" . }}-api
  labels:
    {{- include "multi-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    {{- include "multi-agent-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-agent-platform.fullname" . }}-web
  labels:
    {{- include "multi-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "multi-agent-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
