global:
  # Global SMTP configuration
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@example.com'
  smtp_auth_username: 'alerts@example.com'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack webhook URL (can be overridden per receiver)
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # PagerDuty integration key
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route defines the tree of routing rules
route:
  # Default receiver for all alerts
  receiver: 'default'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'component']

  # How long to wait before sending initial notification
  group_wait: 10s

  # How long to wait before sending notification about new alerts added to group
  group_interval: 10s

  # How long to wait before re-sending a notification
  repeat_interval: 3h

  # Child routes
  routes:
    # Critical alerts go to PagerDuty
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
      group_wait: 5s
      repeat_interval: 1h

    # Platform alerts
    - match:
        component: platform
      receiver: 'platform-team'
      group_by: ['alertname', 'severity']

    # Database alerts
    - match:
        component: database
      receiver: 'database-team'

    # Cache/Redis alerts
    - match:
        component: cache
      receiver: 'platform-team'

    # Queue alerts
    - match:
        component: queues
      receiver: 'platform-team'

    # Resource alerts
    - match:
        component: resources
      receiver: 'infrastructure-team'

    # Runs alerts
    - match:
        component: runs
      receiver: 'platform-team'

# Inhibition rules - suppress certain alerts when others are active
inhibit_rules:
  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

  # Suppress individual errors if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*Error.*|.*Failure.*'
    equal: ['job']

# Receivers define notification destinations
receivers:
  # Default receiver - logs to console
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9090/alerts'
        send_resolved: true

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          message: '{{ .CommonAnnotations.description }}'
          runbook: '{{ .CommonAnnotations.runbook_url }}'

  # Platform team notifications
  - name: 'platform-team'
    email_configs:
      - to: 'platform-team@example.com'
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        html: |
          <!DOCTYPE html>
          <html>
          <body>
            <h2>{{ .GroupLabels.alertname }}</h2>
            <p><strong>Status:</strong> {{ .Status }}</p>
            <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
            <p><strong>Component:</strong> {{ .CommonLabels.component }}</p>
            <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
            <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
            {{ if .CommonAnnotations.runbook_url }}
            <p><a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a></p>
            {{ end }}
          </body>
          </html>
    slack_configs:
      - channel: '#platform-alerts'
        username: 'AlertManager'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '{{ .GroupLabels.alertname }}'
        text: |
          {{ .CommonAnnotations.summary }}
          {{ .CommonAnnotations.description }}
        fields:
          - title: 'Severity'
            value: '{{ .CommonLabels.severity }}'
            short: true
          - title: 'Component'
            value: '{{ .CommonLabels.component }}'
            short: true
          - title: 'Firing Alerts'
            value: '{{ .Alerts.Firing | len }}'
            short: true
        actions:
          - type: button
            text: 'Runbook :books:'
            url: '{{ .CommonAnnotations.runbook_url }}'

  # Database team notifications
  - name: 'database-team'
    email_configs:
      - to: 'database-team@example.com'
        headers:
          Subject: '[DB] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#database-alerts'
        username: 'AlertManager'

  # Infrastructure team notifications
  - name: 'infrastructure-team'
    email_configs:
      - to: 'infra-team@example.com'
        headers:
          Subject: '[INFRA] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#infrastructure-alerts'
        username: 'AlertManager'

# Time intervals for maintenance windows
time_intervals:
  - name: 'business_hours'
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '17:00'
        weekdays: ['monday:friday']

  - name: 'off_hours'
    time_intervals:
      - times:
          - start_time: '00:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
      - times:
          - start_time: '17:00'
            end_time: '23:59'
        weekdays: ['monday:friday']
      - weekdays: ['saturday', 'sunday']
